name: sim_spanla_fe
description: "SIM SPANLA - Sistem Informasi Manajemen Pembelajaran"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8
  
  # State Management - BLoC Pattern
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # API & Networking
  dio: ^5.4.0
  json_annotation: ^4.8.1
  logger: ^2.0.2
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  
  # Utils
  intl: ^0.19.0
  image_picker: ^1.0.5
  # qr_code_scanner: ^1.0.1  # Deprecated - will use mobile_scanner later
  permission_handler: ^11.0.1
  
  # Navigation
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
